name: patchi_wani_flutter
description: A tap game that makes eye patch time more fun for young children

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Rust FFI bridge
  ffi: ^2.1.0

  # JSON (dart:convert is part of the standard library — no extra package needed)

  # Audio playback (for custom .mp3 sound files)
  audioplayers: ^6.0.0

  # SQLite (play log persistence)
  sqflite: ^2.3.3

  # パス解決ユーティリティ
  path_provider: ^2.1.3  # path resolution
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/game_rule_default.json
