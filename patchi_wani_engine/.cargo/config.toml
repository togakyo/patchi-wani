# patchi_wani_engine/.cargo/config.toml
#
# Linker config for Android cross-compilation.
#
# RECOMMENDED: If you use cargo-ndk, you do not need to edit this file:
#   cargo install cargo-ndk
#   cargo ndk -t arm64-v8a build --release
#
# If you build without cargo-ndk, replace "/path/to/..." below with
# the actual NDK path on your machine.
#
# Finding the NDK path:
#   Android Studio → SDK Manager → SDK Tools → note the NDK path
#
# Examples:
#   macOS: /Users/<user>/Library/Android/sdk/ndk/25.2.9519653/toolchains/...
#   Linux: /home/<user>/Android/Sdk/ndk/25.2.9519653/toolchains/...
#
# ⚠️ Do not commit absolute paths to this file.
#    Keep personal paths in ~/.cargo/config.toml instead.

[target.aarch64-linux-android]
linker = "/path/to/android/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"

[target.x86_64-linux-android]
linker = "/path/to/android/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android33-clang"

[target.aarch64-apple-ios]
# iOS uses Xcode's clang — no linker override needed
